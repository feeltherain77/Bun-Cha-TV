name: Buncha Auto Update
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  buncha_task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Request
        run: pip install requests

      - name: Run Robot
        run: python get_link.py

      - name: Update Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Lệnh VIP: Dọn sạch mọi xung đột trước khi cập nhật
          git add list.m3u
          git stash || echo "Không có gì để cất"
          git pull origin main --rebase
          git stash pop || echo "Không có gì để lấy lại"
          
          echo "# Last Update: $(date)" >> list.m3u
          git add list.m3u
          git commit -m "Auto Update Bún Chả: $(date)" || exit 0
          git push origin main
          
